<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filecoin Storage Provider Business Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #f3f4f6; }
        .section-toggle { transition: max-height 0.3s ease, opacity 0.2s ease; overflow: hidden; }
        .section-toggle.collapsed { max-height: 0; opacity: 0; }
        .section-toggle.expanded { max-height: 5000px; opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const { useState, useEffect, createElement: h } = React;

        // ── Collapsible Section Component ──
        function Section(props) {
          var open = props.open !== false; // default open
          var toggle = props.onToggle;
          return h('div', { className: 'mb-8' },
            h('div', {
              className: 'flex items-center justify-between cursor-pointer select-none group',
              onClick: toggle
            },
              h('h2', { className: 'text-2xl font-bold text-blue-900 group-hover:text-blue-700 transition-colors' }, props.title),
              h('span', { className: 'text-gray-400 text-lg transition-transform ' + (open ? 'rotate-0' : '-rotate-90') },
                open ? '\u25BC' : '\u25B6'
              )
            ),
            h('div', { className: 'section-toggle ' + (open ? 'expanded' : 'collapsed') },
              h('div', { className: 'pt-4' }, props.children)
            )
          );
        }

        function FilecoinBusinessPlan() {
          // ── Core state ──
          const [storageCapacity, setStorageCapacity] = useState(10);
          const [powerCost, setPowerCost] = useState(0.065);
          const [datacapMultiplier, setDatacapMultiplier] = useState(10);
          const [hardwareType, setHardwareType] = useState('premium');
          const [blockReward, setBlockReward] = useState(0.0035);
          const [pledgePerSector, setPledgePerSector] = useState(0.07);
          const [dailyGasCost, setDailyGasCost] = useState(5);
          const [sectorDuration, setSectorDuration] = useState(12);
          const [downPaymentPct, setDownPaymentPct] = useState(20);
          const [interestRatePct, setInterestRatePct] = useState(7);
          const [loanTermMonths, setLoanTermMonths] = useState(36);
          const [projectionMonths, setProjectionMonths] = useState(60);
          const [exitMonth, setExitMonth] = useState(36);
          const [exchangeRate, setExchangeRate] = useState(1.38);
          const [filPrice, setFilPrice] = useState(5.5);
          const [filPriceLoading, setFilPriceLoading] = useState(true);
          const [lastUpdated, setLastUpdated] = useState('');

          // ── View toggles ──
          const [activeView, setActiveView] = useState('technical'); // technical | financial | fip | geography
          const [showAssumptions, setShowAssumptions] = useState(false);

          // ── Section collapse state ──
          const [sections, setSections] = useState({
            executive: true,
            hardware: false,
            capex: false,
            opex: true,
            revenue: true,
            metrics: true,
            exit: false
          });
          function toggleSection(key) {
            setSections(function(prev) { var n = Object.assign({}, prev); n[key] = !n[key]; return n; });
          }

          // ── FIP Simulation state ──
          const [activeFip, setActiveFip] = useState('FIP-Daybreak');
          const [fipList, setFipList] = useState([
            {
              id: 'FIP-TEMPLATE',
              title: 'Template -- Add Your FIP Here',
              status: 'template',
              summary: 'Use this as a starting point. Duplicate and fill in the parameter overrides for any new FIP you receive.',
              overrides: {}
            },
            {
              id: 'FIP-0076',
              title: 'Direct Data Onboarding',
              status: 'active',
              summary: 'Allows data to be onboarded directly to sectors without Filecoin+ DataCap, reducing gas costs and simplifying onboarding for large datasets.',
              link: 'https://github.com/filecoin-project/FIPs/blob/master/FIPS/fip-0076.md',
              overrides: { dailyGasCost: 3, blockReward: 0.003 }
            },
            {
              id: 'FIP-0084',
              title: 'Remove Datacap from Sector Duration Multiplier',
              status: 'draft',
              summary: 'Proposes removing Datacap from the sector quality multiplier, shifting rewards toward base storage power.',
              link: 'https://github.com/filecoin-project/FIPs/blob/master/FIPS/fip-0084.md',
              overrides: { datacapMultiplier: 1, blockReward: 0.012 }
            },
            {
              id: 'FIP-Daybreak',
              title: 'Daybreak: Restore Equal Sector Quality & Burn Mining Reserve',
              status: 'draft',
              summary: 'Eliminates the 10x verified deal weight multiplier over 12 months (all sectors equal at 1x). Burns ~282.9M FIL mining reserve. CC base reward increases ~8.5x as QAP collapses from 18.5 EiB to 2.17 EiB. Pledge per sector rises ~6.5x under FIP-0081 interaction. Annual pledge-ROI improves from ~23% to ~30%. Removes notary-gated reward distribution.',
              link: 'https://github.com/filecoin-project/FIPs/discussions/1238',
              overrides: { datacapMultiplier: 0, blockReward: 0.0291, pledgePerSector: 1.093 }
            }
          ]);
          const [newFipId, setNewFipId] = useState('');
          const [newFipTitle, setNewFipTitle] = useState('');
          const [newFipSummary, setNewFipSummary] = useState('');
          const [newFipLink, setNewFipLink] = useState('');
          const [newFipOverrides, setNewFipOverrides] = useState('');
          const [showAddFip, setShowAddFip] = useState(false);

          // ── Geography state & data ──
          const [selectedGeo, setSelectedGeo] = useState('canada-qc');
          const geoProfiles = {
            'canada-qc': {
              name: 'Canada (Quebec)',
              flag: 'CA',
              powerCostUsd: 0.047,
              bandwidthMo: 500,
              coloPerKwMo: 80,
              laborAnnual: 78000,
              corpTaxPct: 26.5,
              notes: 'Abundant hydropower, cold climate natural cooling, crypto-friendly provincial government',
              strengths: 'Cheapest power in N. America, natural cooling, stable grid',
              weaknesses: 'Smaller talent pool, distance from major IX hubs'
            },
            'us-tx': {
              name: 'US (Texas)',
              flag: 'US',
              powerCostUsd: 0.06,
              bandwidthMo: 800,
              coloPerKwMo: 90,
              laborAnnual: 115000,
              corpTaxPct: 21,
              notes: 'Deregulated energy market, no state income tax, growing datacenter hub',
              strengths: 'Low power costs, deep capital markets, no state income tax',
              weaknesses: 'Grid reliability concerns (ERCOT), rising AI datacenter competition'
            },
            'us-va': {
              name: 'US (Virginia)',
              flag: 'US',
              powerCostUsd: 0.08,
              bandwidthMo: 600,
              coloPerKwMo: 140,
              laborAnnual: 130000,
              corpTaxPct: 21,
              notes: 'World largest datacenter market (Ashburn), premium connectivity',
              strengths: 'Best connectivity, deepest colo supply, strong talent pool',
              weaknesses: 'High costs across the board, intense AI datacenter competition for space'
            },
            'china': {
              name: 'China (Sichuan)',
              flag: 'CN',
              powerCostUsd: 0.04,
              bandwidthMo: 300,
              coloPerKwMo: 60,
              laborAnnual: 35000,
              corpTaxPct: 25,
              notes: 'Lowest energy costs globally via hydropower, largest historical SP base. Cross-border bandwidth is throttled.',
              strengths: 'Cheapest energy + colo, strong hardware supply chain, largest SP base',
              weaknesses: 'International bandwidth constraints, regulatory uncertainty, GPU export restrictions'
            },
            'eu-de': {
              name: 'EU (Germany)',
              flag: 'DE',
              powerCostUsd: 0.20,
              bandwidthMo: 700,
              coloPerKwMo: 160,
              laborAnnual: 95000,
              corpTaxPct: 30,
              notes: 'Highest energy costs in major markets. Strong IX ecosystem (DE-CIX Frankfurt).',
              strengths: 'GDPR-compliant storage premium, strong IX infrastructure',
              weaknesses: 'Very high energy costs, high corporate tax, expensive colo'
            },
            'eu-nordics': {
              name: 'EU (Nordics)',
              flag: 'NO',
              powerCostUsd: 0.06,
              bandwidthMo: 600,
              coloPerKwMo: 90,
              laborAnnual: 85000,
              corpTaxPct: 22,
              notes: 'Abundant hydropower, natural cooling (sub-zero temps), GDPR jurisdiction.',
              strengths: 'Cheapest European energy, natural cooling, GDPR compliance moat',
              weaknesses: 'Small talent pool, limited colo capacity, remote location'
            },
            'india': {
              name: 'India (Mumbai)',
              flag: 'IN',
              powerCostUsd: 0.07,
              bandwidthMo: 350,
              coloPerKwMo: 60,
              laborAnnual: 20000,
              corpTaxPct: 25,
              notes: 'Rapidly growing DC market. Data localization laws create captive local demand.',
              strengths: 'Low labor + energy costs, growing talent, data localization demand',
              weaknesses: 'Infrastructure reliability, 10-30% import duties on server hardware'
            },
            'uae': {
              name: 'Middle East (UAE)',
              flag: 'AE',
              powerCostUsd: 0.04,
              bandwidthMo: 900,
              coloPerKwMo: 120,
              laborAnnual: 70000,
              corpTaxPct: 9,
              notes: 'Heavily subsidized energy, aggressive economic diversification, crypto-friendly free zones.',
              strengths: 'Cheapest energy globally, low tax (9% corp), regulatory push to diversify',
              weaknesses: 'High cooling costs due to climate, smaller technical talent pool'
            },
            'sea': {
              name: 'SE Asia (Malaysia)',
              flag: 'MY',
              powerCostUsd: 0.06,
              bandwidthMo: 400,
              coloPerKwMo: 70,
              laborAnnual: 25000,
              corpTaxPct: 24,
              notes: 'Competitive costs outside Singapore. Rapidly improving connectivity.',
              strengths: 'Low costs, improving connectivity, growing DC infrastructure',
              weaknesses: 'Smaller talent pool, less DC infrastructure than Tier 1 markets'
            },
            'africa': {
              name: 'Africa (Kenya)',
              flag: 'KE',
              powerCostUsd: 0.08,
              bandwidthMo: 1200,
              coloPerKwMo: 150,
              laborAnnual: 18000,
              corpTaxPct: 30,
              notes: 'Limited DC supply, expensive bandwidth. Nairobi is a growing hub.',
              strengths: 'Low labor costs, untapped market, some cheap power (Ethiopia hydro)',
              weaknesses: 'Infrastructure reliability, expensive bandwidth, limited DC supply'
            }
          };

          // Fetch real-time FIL price
          useEffect(function() {
            fetch('https://api.coingecko.com/api/v3/simple/price?ids=filecoin&vs_currencies=usd')
              .then(function(res) { return res.json(); })
              .then(function(data) {
                if (data.filecoin && data.filecoin.usd) {
                  setFilPrice(data.filecoin.usd);
                  setLastUpdated(new Date().toLocaleString());
                }
                setFilPriceLoading(false);
              })
              .catch(function(err) {
                console.error('Failed to fetch FIL price:', err);
                setFilPriceLoading(false);
              });
          }, []);

          // Hardware configurations
          const hardwareConfigs = {
            enterprise: {
              name: 'Enterprise (Datacenter Grade)', label: 'Enterprise',
              storagePerServer: 0.6, costPerServer: 65000, powerPerServer: 2.0, spacePerServer: 4,
              maintenancePerServer: 75, usefulLifeMonths: 60, residualPct: 0.40,
              description: 'AMD EPYC 9004 (Genoa), enterprise U.2 NVMe, ECC RAM, redundant PSU',
              residualNote: 'High HPC/AI inference resale value'
            },
            premium: {
              name: 'Premium (Current Gen)', label: 'Premium',
              storagePerServer: 0.5, costPerServer: 45000, powerPerServer: 2.5, spacePerServer: 4,
              maintenancePerServer: 100, usefulLifeMonths: 60, residualPct: 0.30,
              description: 'AMD EPYC 7003 (Milan), enterprise NVMe SSDs -- proven reliability',
              residualNote: 'Strong HPC secondary market demand'
            },
            refurbished: {
              name: 'Mid-Range (Refurbished)', label: 'Mid-Range',
              storagePerServer: 0.35, costPerServer: 25000, powerPerServer: 3.0, spacePerServer: 4,
              maintenancePerServer: 135, usefulLifeMonths: 48, residualPct: 0.10,
              description: 'Refurbished EPYC 7002 (Rome) / Xeon 3rd Gen, mix of enterprise & consumer NVMe',
              residualNote: 'Limited secondary market'
            },
            budget: {
              name: 'Budget (DIY / Legacy)', label: 'Budget',
              storagePerServer: 0.25, costPerServer: 15000, powerPerServer: 3.5, spacePerServer: 4,
              maintenancePerServer: 175, usefulLifeMonths: 36, residualPct: 0.0,
              description: 'Older Ryzen Threadripper / Xeon E5 v4, consumer SATA + NVMe',
              residualNote: 'No resale value'
            }
          };
          const hardwareKeys = Object.keys(hardwareConfigs);
          const hardware = hardwareConfigs[hardwareType];

          // ── Calculations ──
          const filPriceCad = filPrice * exchangeRate;
          const sectorsPerTiB = 32;
          const totalSectors = storageCapacity * 1024 * sectorsPerTiB;
          const totalPledgeFil = totalSectors * pledgePerSector;
          const totalPledgeCad = totalPledgeFil * filPriceCad;
          const monthlyGasCost = dailyGasCost * 30 * filPriceCad;

          const serversNeeded = Math.ceil(storageCapacity / hardware.storagePerServer);
          const costPerServer = hardware.costPerServer;
          const totalHardwareCost = serversNeeded * costPerServer;

          const downPayment = downPaymentPct / 100;
          const loanTerm = loanTermMonths;
          const interestRate = interestRatePct / 100;
          const monthlyRate = interestRate / 12;
          const loanAmount = totalHardwareCost * (1 - downPayment);
          const monthlyPayment = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, loanTerm)) / (Math.pow(1 + monthlyRate, loanTerm) - 1);

          const powerPerServer = hardware.powerPerServer;
          const totalPowerKw = powerPerServer * serversNeeded;
          const monthlyPowerCost = totalPowerKw * 24 * 30 * powerCost;

          const spacePerServer = hardware.spacePerServer;
          const rackSpaceNeeded = Math.ceil(serversNeeded * spacePerServer / 42);
          const costPerRackSpace = 350;
          const monthlySpaceCost = rackSpaceNeeded * costPerRackSpace;

          const monthlyBandwidth = 500;
          const monthlyMaintenance = serversNeeded * hardware.maintenancePerServer;
          const monthlyInsurance = 400;
          const monthlySalary = 6500;

          const totalMonthlyOpex = monthlyPowerCost + monthlySpaceCost + monthlyBandwidth +
                                   monthlyMaintenance + monthlyInsurance + monthlySalary + monthlyGasCost;

          const baseBlockReward = blockReward;
          const datacapBonus = baseBlockReward * datacapMultiplier;
          const totalRewardRate = baseBlockReward + datacapBonus;
          const dailyRevenue = storageCapacity * 1024 * totalRewardRate * filPriceCad;
          const monthlyRevenue = dailyRevenue * 30;

          const months = projectionMonths;
          var cumulativeCashFlow = -(totalHardwareCost * downPayment) - totalPledgeCad;
          var breakEvenMonth = null;
          var exitCashFlow = cumulativeCashFlow;

          for (var month = 1; month <= months; month++) {
            var isFinancing = month <= loanTerm;
            var monthlyCapex = isFinancing ? monthlyPayment : 0;
            var totalMonthlyCost = totalMonthlyOpex + monthlyCapex;
            var monthlyProfit = monthlyRevenue - totalMonthlyCost;
            cumulativeCashFlow += monthlyProfit;
            if (breakEvenMonth === null && cumulativeCashFlow > 0) breakEvenMonth = month;
            if (month === exitMonth) exitCashFlow = cumulativeCashFlow;
          }
          if (exitMonth > months) exitCashFlow = cumulativeCashFlow;

          const yearlyProfit = monthlyRevenue * 12 - (totalMonthlyOpex * 12) - (monthlyPayment * 12);
          const roi = (yearlyProfit / totalHardwareCost) * 100;

          // Exit valuation
          const usefulLife = hardware.usefulLifeMonths;
          const residualFloor = hardware.residualPct;
          const hwDepreciationPct = exitMonth >= usefulLife ? residualFloor : 1 - (1 - residualFloor) * exitMonth / usefulLife;
          const hardwareResidualValue = totalHardwareCost * hwDepreciationPct;
          const remainingLoanBalance = exitMonth >= loanTerm ? 0
            : loanAmount * (Math.pow(1 + monthlyRate, loanTerm) - Math.pow(1 + monthlyRate, exitMonth)) / (Math.pow(1 + monthlyRate, loanTerm) - 1);
          const pledgeReturnedCad = totalPledgeCad;

          var exitOperatingProfit = 0;
          for (var m = 1; m <= exitMonth && m <= months; m++) {
            var capex = m <= loanTerm ? monthlyPayment : 0;
            exitOperatingProfit += monthlyRevenue - totalMonthlyOpex - capex;
          }
          const netExitValue = exitOperatingProfit - (totalHardwareCost * downPayment) + hardwareResidualValue + pledgeReturnedCad - remainingLoanBalance - totalPledgeCad;

          // ── FIP Simulation Engine ──
          const simOverrides = activeFip ? (fipList.find(function(f) { return f.id === activeFip; }) || {}).overrides || {} : {};
          const simActive = activeFip && Object.keys(simOverrides).length > 0;
          var sim = {};
          if (simActive) {
            var sBlockReward  = simOverrides.blockReward != null ? simOverrides.blockReward : blockReward;
            var sDatacap      = simOverrides.datacapMultiplier != null ? simOverrides.datacapMultiplier : datacapMultiplier;
            var sDailyGas     = simOverrides.dailyGasCost != null ? simOverrides.dailyGasCost : dailyGasCost;
            var sPledgeSector = simOverrides.pledgePerSector != null ? simOverrides.pledgePerSector : pledgePerSector;
            var sSectorDur    = simOverrides.sectorDuration != null ? simOverrides.sectorDuration : sectorDuration;
            var sBase = sBlockReward;
            var sBonus = sBase * sDatacap;
            var sTotalRate = sBase + sBonus;
            var sDailyRev = storageCapacity * 1024 * sTotalRate * filPriceCad;
            var sMonthlyRev = sDailyRev * 30;
            var sMonthlyGas = sDailyGas * 30 * filPriceCad;
            var sTotalPledgeFil = totalSectors * sPledgeSector;
            var sTotalPledgeCad = sTotalPledgeFil * filPriceCad;
            var sOpex = monthlyPowerCost + monthlySpaceCost + monthlyBandwidth + monthlyMaintenance + monthlyInsurance + monthlySalary + sMonthlyGas;
            var sNetProfit = sMonthlyRev - sOpex - monthlyPayment;
            var sYearlyProfit = sMonthlyRev * 12 - sOpex * 12 - monthlyPayment * 12;
            var sRoi = (sYearlyProfit / totalHardwareCost) * 100;
            var sCumCash = -(totalHardwareCost * downPayment) - sTotalPledgeCad;
            var sBreakEven = null;
            for (var sm = 1; sm <= months; sm++) {
              var sCapex = sm <= loanTerm ? monthlyPayment : 0;
              sCumCash += sMonthlyRev - sOpex - sCapex;
              if (sBreakEven === null && sCumCash > 0) sBreakEven = sm;
            }
            sim = {
              monthlyRevenue: sMonthlyRev, totalMonthlyOpex: sOpex, netProfit: sNetProfit,
              yearlyProfit: sYearlyProfit, roi: sRoi, breakEvenMonth: sBreakEven,
              totalPledgeCad: sTotalPledgeCad, totalPledgeFil: sTotalPledgeFil,
              blockReward: sBlockReward, datacapMultiplier: sDatacap,
              dailyGasCost: sDailyGas, pledgePerSector: sPledgeSector, sectorDuration: sSectorDur
            };
          }

          // ── Geography comparison engine ──
          var geo = geoProfiles[selectedGeo];
          var geoKeys = Object.keys(geoProfiles);
          function geoMonthlyOpex(profile) {
            var pCostLocal = profile.powerCostUsd * exchangeRate;
            var pwr = totalPowerKw * 24 * 30 * pCostLocal;
            var bw = profile.bandwidthMo * exchangeRate;
            var colo = rackSpaceNeeded * profile.coloPerKwMo * exchangeRate;
            var labor = (profile.laborAnnual / 12) * exchangeRate;
            return pwr + bw + colo + labor + monthlyInsurance + monthlyGasCost;
          }

          function fmtDelta(newVal, oldVal, prefix, suffix) {
            prefix = prefix || '$';
            suffix = suffix || '';
            var d = newVal - oldVal;
            if (Math.abs(d) < 0.5) return null;
            var sign = d >= 0 ? '+' : '';
            return sign + prefix + Math.round(d).toLocaleString() + suffix;
          }

          // ══════════════════════════════════════════
          // RENDER
          // ══════════════════════════════════════════
          return h('div', { className: 'w-full max-w-6xl mx-auto p-6 bg-white min-h-screen' },

            // ── Top Bar: Title + Toggle Pills ──
            h('div', { className: 'flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4' },
              h('div', {},
                h('h1', { className: 'text-3xl font-bold text-blue-900' }, 'Filecoin SP Business Plan'),
                h('p', { className: 'text-sm text-gray-500 mt-1' }, 'Strategic Analysis & Financial Projections')
              ),
              h('div', { className: 'flex flex-wrap items-center gap-2' },
                // View toggle pills
                ['technical', 'financial', 'fip', 'geography'].map(function(view) {
                  var labels = { technical: 'Technical', financial: 'Financial', fip: 'FIP Simulation', geography: 'Geography' };
                  var colors = {
                    technical: activeView === 'technical' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-blue-700 border border-blue-200 hover:bg-blue-50',
                    financial: activeView === 'financial' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-blue-700 border border-blue-200 hover:bg-blue-50',
                    fip: activeView === 'fip' ? 'bg-amber-500 text-white shadow-md' : 'bg-white text-amber-700 border border-amber-200 hover:bg-amber-50',
                    geography: activeView === 'geography' ? 'bg-emerald-600 text-white shadow-md' : 'bg-white text-emerald-700 border border-emerald-200 hover:bg-emerald-50'
                  };
                  return h('button', {
                    key: view,
                    onClick: function() { setActiveView(view); },
                    className: 'px-4 py-2 text-sm font-medium rounded-lg transition-all ' + colors[view]
                  }, labels[view]);
                }),
                // Divider
                h('span', { className: 'text-gray-300 hidden md:inline' }, '|'),
                // Key Assumptions toggle
                h('button', {
                  onClick: function() { setShowAssumptions(!showAssumptions); },
                  className: 'px-3 py-2 text-xs font-medium rounded-lg transition-all ' +
                    (showAssumptions ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200')
                }, showAssumptions ? 'Hide Assumptions' : 'Key Assumptions')
              )
            ),

            // ── Active sim banner (always visible when a FIP is active) ──
            simActive && activeView !== 'fip' ? h('div', {
              className: 'bg-amber-100 border border-amber-300 p-3 rounded-lg mb-6 flex items-center justify-between'
            },
              h('div', { className: 'flex items-center gap-2' },
                h('span', { className: 'text-amber-700 font-bold text-sm' }, 'Simulation Active:'),
                h('span', { className: 'text-sm' }, (fipList.find(function(f) { return f.id === activeFip; }) || {}).title)
              ),
              h('div', { className: 'flex gap-2' },
                h('button', { onClick: function() { setActiveView('fip'); }, className: 'px-3 py-1 text-xs bg-amber-200 rounded hover:bg-amber-300' }, 'View Details'),
                h('button', { onClick: function() { setActiveFip(null); }, className: 'px-3 py-1 text-xs bg-gray-200 rounded hover:bg-gray-300' }, 'Clear')
              )
            ) : null,

            // ── FIL Price Banner ──
            h('div', { className: 'bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4 rounded-lg mb-6' },
              h('div', { className: 'flex justify-between items-center' },
                h('div', {},
                  h('div', { className: 'text-sm opacity-90' }, 'LIVE FIL Price'),
                  h('div', { className: 'text-3xl font-bold' }, filPriceLoading ? 'Loading...' : '$' + filPrice.toFixed(2) + ' USD'),
                  h('div', { className: 'text-sm opacity-75' }, lastUpdated ? 'Updated: ' + lastUpdated : 'Fetching from CoinGecko...')
                ),
                h('div', { className: 'text-right' },
                  h('div', { className: 'text-sm opacity-90' }, 'CAD Equivalent'),
                  h('div', { className: 'text-2xl font-bold' }, '$' + filPriceCad.toFixed(2) + ' CAD'),
                  h('div', { className: 'text-sm opacity-75' }, '(' + exchangeRate + ' USD/CAD)')
                )
              )
            ),

            // ── Key Assumptions (collapsible from top) ──
            showAssumptions ? h('div', { className: 'bg-blue-50 p-6 rounded-lg mb-6 border border-blue-200' },
              h('div', { className: 'flex items-center justify-between mb-3' },
                h('h2', { className: 'text-xl font-bold' }, 'Key Assumptions'),
                h('button', { onClick: function() { setShowAssumptions(false); }, className: 'text-xs text-gray-500 hover:text-gray-700' }, 'Hide')
              ),
              h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4 text-sm' },
                h('ul', { className: 'space-y-1' },

                        h('td', { className: 'text-right py-2 font-bold text-green-700' }, '+$' + Math.round(pledgeReturnedCad).toLocaleString())
                      ),
                      h('tr', { className: 'border-b' },
                        h('td', { className: 'py-2 text-gray-600' }, 'Pledge Paid (upfront)'),
                        h('td', { className: 'text-right py-2 font-bold text-red-600' }, '-$' + Math.round(totalPledgeCad).toLocaleString())
                      ),
                      remainingLoanBalance > 0 ? h('tr', { className: 'border-b' },
                        h('td', { className: 'py-2 text-gray-600' }, 'Loan Payoff (remaining)'),
                        h('td', { className: 'text-right py-2 font-bold text-red-600' }, '-$' + Math.round(remainingLoanBalance).toLocaleString())
                      ) : h('tr', { className: 'border-b' },
                        h('td', { className: 'py-2 text-gray-600' }, 'Loan Payoff'),
                        h('td', { className: 'text-right py-2 font-bold text-green-700' }, 'Paid off')
                      ),
                      h('tr', { className: 'bg-gray-100' },
                        h('td', { className: 'py-3 font-bold text-lg' }, 'Net Exit Value'),
                        h('td', { className: 'text-right py-3 font-bold text-xl ' + (netExitValue >= 0 ? 'text-green-700' : 'text-red-600') },
                          (netExitValue >= 0 ? '+' : '') + '$' + Math.round(netExitValue).toLocaleString()
                        )
                      )
                    )
                  )
                ),
                h('div', { className: 'space-y-3' },
                  h('div', { className: 'p-4 rounded-lg ' + (netExitValue >= 0 ? 'bg-green-50' : 'bg-red-50') },
                    h('div', { className: 'text-sm text-gray-600' }, 'Net Position at Exit'),
                    h('div', { className: 'text-3xl font-bold ' + (netExitValue >= 0 ? 'text-green-700' : 'text-red-600') },
                      (netExitValue >= 0 ? '+' : '') + '$' + Math.round(netExitValue).toLocaleString() + ' CAD'
                    ),
                    h('div', { className: 'text-xs text-gray-500 mt-1' },
                      netExitValue >= 0 ? 'Profitable exit' : 'Exiting now would result in a loss'
                    )
                  ),
                  h('div', { className: 'bg-gray-50 p-4 rounded-lg' },
                    h('div', { className: 'text-sm text-gray-600 mb-2' }, 'Asset Recovery'),
                    h('div', { className: 'grid grid-cols-2 gap-3 text-xs' },
                      h('div', {},
                        h('div', { className: 'text-gray-500' }, 'Hardware Resale'),
                        h('div', { className: 'font-bold text-base' }, '$' + Math.round(hardwareResidualValue).toLocaleString()),
                        h('div', { className: 'text-gray-400' }, hardware.residualNote)
                      ),
                      h('div', {},
                        h('div', { className: 'text-gray-500' }, 'Pledge Collateral'),
                        h('div', { className: 'font-bold text-base' }, Math.round(totalPledgeFil).toLocaleString() + ' FIL'),
                        h('div', { className: 'text-gray-400' }, 'Returned when sectors expire')
                      )
                    )
                  ),
                  h('div', { className: 'bg-orange-50 p-4 rounded-lg' },
                    h('div', { className: 'text-sm text-gray-600 mb-1' }, 'Remaining Obligations'),
                    h('div', { className: 'text-xs' },
                      remainingLoanBalance > 0
                        ? 'Loan balance: $' + Math.round(remainingLoanBalance).toLocaleString() + ' (' + Math.max(0, loanTermMonths - exitMonth) + ' payments left)'
                        : 'Loan fully paid off'
                    ),
                    h('div', { className: 'text-xs mt-1' },
                      exitMonth >= sectorDuration ? 'Sectors expired -- FIL unlocked' : (sectorDuration - exitMonth) + ' months until sector expiry'
                    )
                  )
                )
              )
            )

          );
        }

        // Render
        try {
          var root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(FilecoinBusinessPlan));
          console.log('App loaded');
        } catch (error) {
          console.error('Error:', error);
          document.getElementById('root').innerHTML = '<div style="padding:2rem;color:red;">Error loading app. Check console.</div>';
        }
    </script>
</body>
</html>
